<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR-IT Copilot</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .dot { width:8px;height:8px;border-radius:50%;background:#6366f1;animation:bounce 1.2s infinite; }
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
  #msgs { scrollbar-width:thin;scrollbar-color:#e5e7eb transparent; }
  .prose p{margin:.2rem 0}.prose ul{list-style:disc;padding-left:1.2rem}
  .prose ol{list-style:decimal;padding-left:1.2rem}.prose li{margin:.1rem 0}
  .prose strong{font-weight:600}.prose h3{font-weight:600;margin:.4rem 0}
  .prose table{width:100%;border-collapse:collapse;font-size:.8rem;margin:.5rem 0}
  .prose td,.prose th{border:1px solid #e5e7eb;padding:.3rem .5rem}
  .prose th{background:#f9fafb;font-weight:600}
  .prose code{background:#f3f4f6;padding:.1rem .3rem;border-radius:.25rem;font-size:.8rem}
</style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden">

<!-- ── LOGIN ─────────────────────────────────────────────────────────────── -->
<div id="loginPage" class="h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 to-indigo-900">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-96">
    <div class="text-center mb-7">
      <div class="text-5xl mb-2">🏢</div>
      <h1 class="text-xl font-bold text-gray-800">HR-IT Copilot</h1>
      <p class="text-gray-400 text-xs mt-1">Enterprise AI Assistant</p>
    </div>
    <div id="loginErr" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-600 text-xs rounded-xl"></div>
    <div class="space-y-3">
      <input id="eid" type="text" placeholder="Employee ID (e.g. EMP001)"
        class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
        onkeydown="if(event.key==='Enter')login()">
      <input id="pwd" type="password" placeholder="Password"
        class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
        onkeydown="if(event.key==='Enter')login()">
      <button onclick="login()" id="loginBtn"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl text-sm transition-colors">
        Sign In
      </button>
    </div>
    <div class="mt-5 p-3 bg-gray-50 rounded-xl">
      <p class="text-xs text-gray-400 mb-1 font-medium">Demo accounts (password: password123)</p>
      <div class="text-xs text-gray-500 space-y-0.5">
        <div class="flex gap-2"><span class="font-mono">EMP001</span><span class="text-gray-400">Alice — Employee</span></div>
        <div class="flex gap-2"><span class="font-mono">EMP002</span><span class="text-gray-400">Bob — Manager</span></div>
        <div class="flex gap-2"><span class="font-mono">HR001</span><span class="text-gray-400">Carol — HR Team</span></div>
        <div class="flex gap-2"><span class="font-mono">IT001</span><span class="text-gray-400">Dave — IT Team</span></div>
        <div class="flex gap-2"><span class="font-mono">ADM001</span><span class="text-gray-400">Eve — Admin</span></div>
      </div>
    </div>
  </div>
</div>

<!-- ── MAIN APP ───────────────────────────────────────────────────────────── -->
<div id="app" class="hidden h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 px-4 py-2.5 flex items-center justify-between shadow-sm z-10">
    <div class="flex items-center gap-2.5">
      <span class="text-lg">🏢</span>
      <span class="font-semibold text-gray-800 text-sm">HR-IT Copilot</span>
    </div>
    <div class="flex items-center gap-3">
      <div id="hUser" class="text-sm text-gray-600"></div>
      <span id="hRole" class="text-xs px-2.5 py-1 rounded-full font-medium"></span>
      <button onclick="logout()" class="text-xs text-gray-400 hover:text-red-500 transition-colors px-2 py-1 rounded-lg hover:bg-red-50">
        Logout
      </button>
    </div>
  </header>

  <!-- Body -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Left Sidebar -->
    <aside class="w-52 bg-white border-r border-gray-200 flex flex-col overflow-hidden flex-shrink-0">
      <!-- User card -->
      <div class="p-3 border-b border-gray-100">
        <div id="ava" class="w-9 h-9 rounded-full flex items-center justify-center text-white font-bold text-xs mb-2"></div>
        <div id="sName" class="text-sm font-semibold text-gray-800 leading-tight"></div>
        <div id="sDept" class="text-xs text-gray-400"></div>
      </div>

      <!-- Quick actions -->
      <div class="p-2 border-b border-gray-100 overflow-y-auto flex-shrink-0 max-h-48">
        <p class="text-xs text-gray-400 font-medium uppercase tracking-wide px-1 mb-1.5">Quick Actions</p>
        <div id="qa" class="space-y-0.5"></div>
      </div>

      <!-- Nav panels -->
      <div class="p-2 overflow-y-auto flex-1">
        <p class="text-xs text-gray-400 font-medium uppercase tracking-wide px-1 mb-1.5">Panels</p>
        <div class="space-y-0.5" id="navPanel">
          <button data-panel="balance" onclick="openPanel('balance')"
            class="npb w-full text-left px-2.5 py-2 rounded-lg text-xs text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 transition-colors">
            📊 Leave Balance
          </button>
          <button data-panel="requests" onclick="openPanel('requests')"
            class="npb w-full text-left px-2.5 py-2 rounded-lg text-xs text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 transition-colors">
            📋 My Leave Requests
          </button>
          <button data-panel="tickets" onclick="openPanel('tickets')"
            class="npb w-full text-left px-2.5 py-2 rounded-lg text-xs text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 transition-colors">
            🎫 My Tickets
          </button>
          <button data-panel="assets" onclick="openPanel('assets')"
            class="npb w-full text-left px-2.5 py-2 rounded-lg text-xs text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 transition-colors">
            💻 My Asset Requests
          </button>
          <button data-panel="approvals" id="navApprove" onclick="openPanel('approvals')"
            class="npb hidden w-full text-left px-2.5 py-2 rounded-lg text-xs text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 transition-colors">
            ✅ Pending Approvals
          </button>
          <button data-panel="alltickets" id="navAllTix" onclick="openPanel('alltickets')"
            class="npb hidden w-full text-left px-2.5 py-2 rounded-lg text-xs text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 transition-colors">
            🔧 All IT Tickets
          </button>
          <button data-panel="stats" id="navStats" onclick="openPanel('stats')"
            class="npb hidden w-full text-left px-2.5 py-2 rounded-lg text-xs text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 transition-colors">
            📈 System Stats
          </button>
        </div>
      </div>

      <!-- Clear memory -->
      <div class="p-2 border-t border-gray-100">
        <button onclick="clearMem()"
          class="w-full text-xs text-gray-400 hover:text-red-500 py-1.5 rounded-lg hover:bg-red-50 transition-colors">
          🗑 Clear Memory
        </button>
      </div>
    </aside>

    <!-- Chat -->
    <main class="flex-1 flex flex-col min-w-0 bg-gray-50">
      <div id="msgs" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

      <!-- Typing indicator -->
      <div id="typing" class="hidden px-4 pb-2">
        <div class="flex items-center gap-2">
          <div class="w-7 h-7 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs font-bold">AI</div>
          <div class="bg-white border border-gray-100 rounded-2xl px-4 py-2.5 shadow-sm flex gap-1.5 items-center">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="bg-white border-t border-gray-200 p-3">
        <div class="flex gap-2 items-end max-w-4xl mx-auto">
          <textarea id="inp" rows="1" placeholder="Ask anything… e.g. 'I want to apply for leave', 'My VPN is broken', 'What is the WFH policy?'"
            class="flex-1 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none max-h-32 bg-gray-50"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,128)+'px'"></textarea>
          <button onclick="send()"
            class="bg-indigo-600 hover:bg-indigo-700 text-white p-2.5 rounded-xl transition-colors flex-shrink-0">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
            </svg>
          </button>
        </div>
      </div>
    </main>

    <!-- Right panel -->
    <aside id="rpanel" class="w-72 bg-white border-l border-gray-200 overflow-y-auto flex-shrink-0">
      <div id="pc" class="p-4 text-sm"></div>
    </aside>

  </div>
</div>

<script>
const API = 'http://localhost:8000';
let tok = sessionStorage.getItem('cptok'), usr = null, curPanel = null;

// ── Startup ────────────────────────────────────────────────────────────────
(async()=>{
  if(tok){ try{ await fetchUser(); boot(); }catch{ tok=null; sessionStorage.removeItem('cptok'); } }
})();

// ── Auth ───────────────────────────────────────────────────────────────────
async function login(){
  const eid=document.getElementById('eid').value.trim();
  const pwd=document.getElementById('pwd').value;
  const err=document.getElementById('loginErr');
  const btn=document.getElementById('loginBtn');
  if(!eid||!pwd){err.textContent='Please enter Employee ID and password.';err.classList.remove('hidden');return;}
  btn.textContent='Signing in…';btn.disabled=true;
  try{
    const r=await fetch(`${API}/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({employee_id:eid,password:pwd})});
    if(!r.ok){err.textContent='Invalid credentials.';err.classList.remove('hidden');btn.textContent='Sign In';btn.disabled=false;return;}
    const d=await r.json(); tok=d.access_token; sessionStorage.setItem('cptok',tok); err.classList.add('hidden');
    await fetchUser(); boot();
  }catch{err.textContent='Cannot connect to server. Is it running on port 8000?';err.classList.remove('hidden');}
  btn.textContent='Sign In';btn.disabled=false;
}

async function fetchUser(){ const r=await fetch(`${API}/auth/me`,{headers:{Authorization:`Bearer ${tok}`}}); if(!r.ok)throw new Error(); usr=await r.json(); }

function logout(){ tok=null;usr=null;sessionStorage.removeItem('cptok');document.getElementById('app').classList.add('hidden');document.getElementById('loginPage').classList.remove('hidden');document.getElementById('msgs').innerHTML=''; }

// ── Boot ───────────────────────────────────────────────────────────────────
const RCOLS={employee:'bg-green-100 text-green-700',manager:'bg-blue-100 text-blue-700',hr_team:'bg-purple-100 text-purple-700',it_team:'bg-orange-100 text-orange-700',admin:'bg-red-100 text-red-700'};
const RLBL={employee:'Employee',manager:'Manager',hr_team:'HR Team',it_team:'IT Team',admin:'Admin'};
const AVCOLS=['bg-indigo-500','bg-purple-500','bg-green-500','bg-orange-500','bg-red-500','bg-teal-500'];

function boot(){
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  const r=usr.role, ini=usr.full_name.split(' ').map(n=>n[0]).join('').toUpperCase();
  const ac=AVCOLS[usr.id%AVCOLS.length];
  document.getElementById('hUser').textContent=usr.full_name;
  const rEl=document.getElementById('hRole'); rEl.textContent=RLBL[r]; rEl.className=`text-xs px-2.5 py-1 rounded-full font-medium ${RCOLS[r]}`;
  const av=document.getElementById('ava'); av.textContent=ini; av.className=`w-9 h-9 rounded-full flex items-center justify-center text-white font-bold text-xs mb-2 ${ac}`;
  document.getElementById('sName').textContent=usr.full_name;
  document.getElementById('sDept').textContent=usr.department||'';
  // Show role-specific nav
  if(['manager','hr_team','admin'].includes(r)) document.getElementById('navApprove').classList.remove('hidden');
  if(['it_team','admin'].includes(r)) document.getElementById('navAllTix').classList.remove('hidden');
  if(r==='admin') document.getElementById('navStats').classList.remove('hidden');
  buildQA(r);
  aiMsg(`Hello **${usr.full_name}**! 👋 I'm your HR & IT Copilot.\n\nI can help you with:\n- 📋 **HR Policies** — Ask anything about company rules\n- 🌴 **Leave** — Apply, check balance, view or approve requests\n- 🎫 **IT Support** — Raise tickets conversationally\n- 💻 **Assets** — Request equipment\n${['manager','hr_team'].includes(r)?'\n- ✅ **Approvals** — Review your team\'s requests':''}\n\nJust type naturally!`,'general');
  openPanel('balance');
}

function buildQA(r){
  const common=[
    ['🌴 Apply Leave','I want to apply for leave'],
    ['📊 Check Balance','What is my leave balance?'],
    ['🎫 Raise IT Ticket','I need to raise an IT support ticket'],
    ['💻 Request Asset','I want to request a laptop'],
    ['📋 WFH Policy','What is the work from home policy?'],
    ['📜 Leave Policy','What are the leave rules?'],
  ];
  const extra={
    manager:[['✅ Pending Approvals','Show me pending leave approvals from my team']],
    hr_team:[['📈 Leave Stats','Show me leave statistics'],['✅ Team Approvals','Show pending approvals']],
    it_team:[['🔧 Open Tickets','Show all open IT tickets'],['📦 Inventory','What is the asset inventory status?']],
    admin:[['📊 System Stats','Show system overview statistics'],['📋 Audit Logs','Show recent audit logs']],
  };
  const all=[...common,...(extra[r]||[])];
  document.getElementById('qa').innerHTML=all.map(([l,m])=>
    `<button onclick="quick('${m.replace(/'/g,"\\'")}')" class="w-full text-left px-2.5 py-1.5 rounded-lg text-xs text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 transition-colors">${l}</button>`
  ).join('');
}

// ── Chat ───────────────────────────────────────────────────────────────────
const IBADGE={
  hr_policy:['Policy','bg-purple-100 text-purple-700'],
  leave_apply:['Apply Leave','bg-green-100 text-green-700'],
  leave_balance:['Balance','bg-teal-100 text-teal-700'],
  leave_status:['Leave Status','bg-blue-100 text-blue-700'],
  leave_approve:['Approval','bg-yellow-100 text-yellow-700'],
  leave_cancel:['Cancel','bg-red-100 text-red-700'],
  it_ticket:['IT Ticket','bg-orange-100 text-orange-700'],
  it_asset:['Asset','bg-indigo-100 text-indigo-700'],
  it_ticket_update:['Ticket Update','bg-gray-100 text-gray-600'],
  general:['General','bg-gray-100 text-gray-500'],
};

function userMsg(t){
  const el=document.createElement('div'); el.className='flex justify-end';
  el.innerHTML=`<div class="max-w-lg bg-indigo-600 text-white rounded-2xl rounded-tr-sm px-4 py-2.5 text-sm shadow-sm">${esc(t)}</div>`;
  document.getElementById('msgs').appendChild(el); scrollDown();
}

function aiMsg(t,intent,sources){
  const [bl,bc]=IBADGE[intent]||IBADGE.general;
  const srcHtml=sources&&sources.length?`
    <div class="mt-2 pt-2 border-t border-gray-100">
      <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="text-xs text-gray-400 hover:text-gray-600 flex items-center gap-1">
        📚 ${sources.length} source${sources.length>1?'s':''} <span>▾</span>
      </button>
      <div class="hidden mt-1 space-y-1">
        ${sources.map(s=>`<div class="text-xs text-gray-400 bg-gray-50 rounded px-2 py-1">Page ${s.page} · score ${s.score}</div>`).join('')}
      </div>
    </div>`:'';
  const el=document.createElement('div'); el.className='flex items-start gap-2';
  el.innerHTML=`
    <div class="w-7 h-7 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0 mt-0.5">AI</div>
    <div class="max-w-2xl bg-white border border-gray-100 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm">
      <span class="text-xs px-2 py-0.5 rounded-full ${bc} mr-1">${bl}</span>
      <div class="prose text-gray-800 text-sm leading-relaxed mt-2">${marked.parse(t)}</div>
      ${srcHtml}
    </div>`;
  document.getElementById('msgs').appendChild(el); scrollDown();
}

async function send(){
  const inp=document.getElementById('inp'); const msg=inp.value.trim(); if(!msg)return;
  inp.value=''; inp.style.height='auto'; userMsg(msg);
  document.getElementById('typing').classList.remove('hidden'); scrollDown();
  try{
    const r=await fetch(`${API}/chat`,{method:'POST',headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    document.getElementById('typing').classList.add('hidden');
    if(r.status===401){logout();return;}
    const d=await r.json();
    if(!r.ok){aiMsg(`⚠️ ${d.detail||'Error. Please try again.'}`, 'general');return;}
    aiMsg(d.response,d.intent,d.sources);
    // Auto-refresh panel after relevant actions
    if(['leave_apply','leave_approve','leave_cancel','it_ticket','it_asset'].includes(d.intent))
      setTimeout(()=>curPanel&&openPanel(curPanel),1500);
  }catch{
    document.getElementById('typing').classList.add('hidden');
    aiMsg('⚠️ Connection error. Is the server running on port 8000?','general');
  }
}

function quick(m){document.getElementById('inp').value=m;send();}
function scrollDown(){const m=document.getElementById('msgs');setTimeout(()=>m.scrollTop=m.scrollHeight,50);}

async function clearMem(){
  if(!confirm('Clear conversation memory?'))return;
  try{await fetch(`${API}/chat/memory`,{method:'DELETE',headers:{Authorization:`Bearer ${tok}`}});}catch{}
  document.getElementById('msgs').innerHTML='';
  aiMsg('Memory cleared! Starting fresh.','general');
}

// ── Panels ─────────────────────────────────────────────────────────────────
function openPanel(name){
  curPanel=name;
  document.querySelectorAll('.npb').forEach(b=>{
    const active=b.dataset.panel===name;
    b.classList.toggle('bg-indigo-50',active);b.classList.toggle('text-indigo-700',active);b.classList.toggle('font-medium',active);
  });
  ({balance:pBalance,requests:pRequests,tickets:pTickets,assets:pAssets,approvals:pApprovals,alltickets:pAllTix,stats:pStats})[name]?.();
}

const pc=()=>document.getElementById('pc');
const pLoad=()=>{pc().innerHTML='<div class="flex justify-center py-8 text-gray-300 text-xs">Loading…</div>';};

async function pBalance(){
  pLoad();
  try{
    const d=await api('GET','/hr/leave/balance');
    const bar=(used,total,col)=>`<div class="w-full bg-gray-100 rounded-full h-1.5 mt-1"><div class="h-1.5 rounded-full ${col}" style="width:${Math.round(used/total*100)}%"></div></div>`;
    pc().innerHTML=`<h3 class="font-semibold text-gray-800 mb-4 flex items-center justify-between">📊 Leave Balance <span class="text-xs text-gray-400 font-normal">${d.year}</span></h3>
    ${[['casual','bg-green-500'],['sick','bg-orange-500'],['privilege','bg-blue-500']].map(([t,c])=>`
      <div class="mb-4 p-3 bg-gray-50 rounded-xl">
        <div class="flex justify-between items-center">
          <span class="text-sm capitalize font-medium text-gray-700">${t}</span>
          <span class="text-xs text-gray-500">${d[t].available} left</span>
        </div>
        ${bar(d[t].used,d[t].total,c)}
        <div class="text-xs text-gray-400 mt-1">${d[t].used} used of ${d[t].total}</div>
      </div>`).join('')}
    <button onclick="quick('I want to apply for leave')" class="w-full mt-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-xs py-2 rounded-xl transition-colors font-medium">+ Apply Leave</button>`;
  }catch{pc().innerHTML=err('leave balance');}
}

async function pRequests(){
  pLoad();
  try{
    const d=await api('GET','/hr/leave/my-requests');
    const sc={pending:'bg-yellow-100 text-yellow-700',approved:'bg-green-100 text-green-700',rejected:'bg-red-100 text-red-700',cancelled:'bg-gray-100 text-gray-500'};
    pc().innerHTML=`<h3 class="font-semibold text-gray-800 mb-4">📋 My Leave Requests</h3>
    ${d.length===0?'<p class="text-xs text-gray-400 text-center py-6">No requests yet</p>':
      d.slice(0,12).map(r=>`<div class="mb-2.5 p-3 bg-gray-50 rounded-xl border border-gray-100">
        <div class="flex justify-between items-center">
          <span class="text-xs font-medium capitalize text-gray-700">${r.leave_type}</span>
          <span class="text-xs px-2 py-0.5 rounded-full ${sc[r.status]}">${r.status}</span>
        </div>
        <div class="text-xs text-gray-500 mt-1">${r.start_date} → ${r.end_date} (${r.num_days}d)</div>
        <div class="text-xs text-gray-400">${r.request_id}</div>
        ${r.status==='pending'?`<button onclick="cancelLeave('${r.request_id}')" class="mt-1.5 text-xs text-red-500 hover:text-red-700">Cancel request</button>`:''}
      </div>`).join('')}`;
  }catch{pc().innerHTML=err('leave requests');}
}

async function cancelLeave(rid){
  if(!confirm('Cancel this leave request?'))return;
  try{
    await api('POST',`/hr/leave/cancel?request_id=${rid}`);
    aiMsg(`Leave request **${rid}** has been cancelled.`,'leave_cancel');
    pRequests();
  }catch(e){aiMsg(`Could not cancel: ${e.message}`,'general');}
}

async function pTickets(){
  pLoad();
  try{
    const d=await api('GET','/it/tickets/my');
    const sc={open:'bg-yellow-100 text-yellow-700',in_progress:'bg-blue-100 text-blue-700',resolved:'bg-green-100 text-green-700',closed:'bg-gray-100 text-gray-500'};
    const pc2={low:'bg-gray-100 text-gray-500',medium:'bg-blue-100 text-blue-600',high:'bg-orange-100 text-orange-700',critical:'bg-red-100 text-red-700'};
    pc().innerHTML=`<h3 class="font-semibold text-gray-800 mb-4">🎫 My Tickets</h3>
    ${d.length===0?'<p class="text-xs text-gray-400 text-center py-6">No tickets yet</p>':
      d.slice(0,12).map(t=>`<div class="mb-2.5 p-3 bg-gray-50 rounded-xl border border-gray-100">
        <div class="flex justify-between items-center">
          <span class="text-xs font-medium text-gray-700">${t.issue_type}</span>
          <span class="text-xs px-2 py-0.5 rounded-full ${sc[t.status]}">${t.status.replace('_',' ')}</span>
        </div>
        <div class="flex gap-1.5 mt-1">
          <span class="text-xs px-1.5 py-0.5 rounded ${pc2[t.priority]}">${t.priority}</span>

}

async function pApprovals(){
  pLoad();
  try{
    const r=await fetch(`${API}/hr/leave/pending-approvals`,{headers:{Authorization:`Bearer ${tok}`}});
    if(r.status===403){pc().innerHTML='<p class="text-xs text-gray-400 text-center py-6">Manager access required</p>';return;}
    const d=await r.json();
    pc().innerHTML=`<h3 class="font-semibold text-gray-800 mb-4">✅ Pending Approvals <span class="ml-1 bg-yellow-100 text-yellow-700 text-xs px-2 py-0.5 rounded-full">${d.length}</span></h3>
    ${d.length===0?'<p class="text-xs text-gray-400 text-center py-6">No pending approvals</p>':
      d.map(r=>`<div class="mb-3 p-3 bg-gray-50 rounded-xl border border-gray-100">
        <div class="text-sm font-medium text-gray-800">${r.employee}</div>
        <div class="text-xs text-gray-500 mt-0.5 capitalize">${r.leave_type} · ${r.num_days} day(s)</div>
        <div class="text-xs text-gray-400">${r.start_date} → ${r.end_date}</div>
        ${r.reason?`<div class="text-xs text-gray-400 italic mt-0.5">"${r.reason}"</div>`:''}
        <div class="flex gap-2 mt-2">
          <button onclick="doApprove('${r.request_id}','approve')" class="flex-1 bg-green-50 hover:bg-green-100 text-green-700 text-xs py-1.5 rounded-lg transition-colors font-medium">✓ Approve</button>
          <button onclick="doApprove('${r.request_id}','reject')" class="flex-1 bg-red-50 hover:bg-red-100 text-red-700 text-xs py-1.5 rounded-lg transition-colors font-medium">✗ Reject</button>
        </div>
      </div>`).join('')}`;
  }catch{pc().innerHTML=err('approvals');}
}

async function doApprove(rid,action){
  const notes=action==='reject'?prompt('Reason for rejection (optional):')||'':'';
  try{
    const d=await api('POST','/hr/leave/approve',{request_id:rid,action,notes});
    aiMsg(`Leave **${rid}** has been **${d.status}**.`,'leave_approve');
    pApprovals();
  }catch(e){aiMsg(`Error: ${e.message}`,'general');}
}

async function pAllTix(){
  pLoad();
  try{
    const r=await fetch(`${API}/it/tickets/all`,{headers:{Authorization:`Bearer ${tok}`}});
    if(r.status===403){pc().innerHTML='<p class="text-xs text-gray-400 text-center py-6">IT Team access required</p>';return;}
    const d=await r.json();
    const open=d.filter(t=>t.status==='open');
    const sc={open:'bg-yellow-100 text-yellow-700',in_progress:'bg-blue-100 text-blue-700',resolved:'bg-green-100 text-green-700',closed:'bg-gray-100 text-gray-500'};
    pc().innerHTML=`<h3 class="font-semibold text-gray-800 mb-4">🔧 All IT Tickets <span class="ml-1 bg-orange-100 text-orange-700 text-xs px-2 py-0.5 rounded-full">${open.length} open</span></h3>
    ${d.length===0?'<p class="text-xs text-gray-400 text-center py-6">No tickets</p>':
      d.slice(0,20).map(t=>`<div class="mb-2 p-3 bg-gray-50 rounded-xl border border-gray-100">
        <div class="flex justify-between items-center">
          <span class="text-xs font-medium text-gray-700">${t.issue_type}</span>
          <span class="text-xs px-2 py-0.5 rounded-full ${sc[t.status]}">${t.status.replace('_',' ')}</span>
        </div>
        <div class="text-xs text-gray-500 mt-0.5">${t.requester} · <span class="font-mono">${t.ticket_id}</span></div>
        ${t.status==='open'||t.status==='in_progress'?`<button onclick="doResolve('${t.ticket_id}')" class="mt-1.5 w-full bg-blue-50 hover:bg-blue-100 text-blue-700 text-xs py-1 rounded-lg transition-colors">Mark Resolved</button>`:''}
      </div>`).join('')}`;
  }catch{pc().innerHTML=err('tickets');}
}

async function doResolve(tid){
  const notes=prompt('Resolution notes:')||'Issue resolved.';
  try{
    await api('PUT','/it/tickets/update',{ticket_id:tid,status:'resolved',resolution_notes:notes});
    aiMsg(`Ticket **${tid}** marked as resolved.`,'it_ticket_update');
    pAllTix();
  }catch(e){aiMsg(`Error: ${e.message}`,'general');}
}

// ── Helpers ────────────────────────────────────────────────────────────────
async function api(method,path,body){
  const opts={method,headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(API+path,opts);
  if(r.status===401){logout();throw new Error('Unauthorized');}
  if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.detail||'Request failed');}
  return r.json();
}

function err(what){return `<p class="text-xs text-gray-400 text-center py-6">Could not load ${what}</p>`;}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
